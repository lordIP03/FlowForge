name: Build Check

on:
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    name: TypeScript & Vite Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Type check (tsc)
        run: npx tsc --noEmit

      - name: Build (vite)
        run: npm run build
